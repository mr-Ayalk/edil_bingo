<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voucher Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <h1 class="text-2xl font-bold mb-6 text-center">Generate Voucher</h1>

    <div class="mb-4">
      <label class="block text-gray-700 mb-2">Amount</label>
      <input
        type="number"
        id="amount"
        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="Enter amount"
      />
    </div>

    <button
      id="generateBtn"
      class="w-full bg-blue-500 text-white py-2 px-4 rounded-md hover:bg-blue-600"
    >
      Generate Voucher
    </button>

    <div id="result" class="mt-6 p-4 bg-green-100 border border-green-300 rounded-md hidden">
      <p class="text-green-800 font-semibold">Voucher Generated:</p>
      <p id="voucherCode" class="text-green-800 text-lg font-mono"></p>
    </div>
  </div>

  <script>
    const amountInput = document.getElementById('amount');
    const generateBtn = document.getElementById('generateBtn');
    const resultDiv = document.getElementById('result');
    const voucherCodeP = document.getElementById('voucherCode');

    generateBtn.addEventListener('click', async () => {
      const amount = parseFloat(amountInput.value);
      if (!amount || amount <= 0) {
        alert('Please enter a valid amount');
        return;
      }

      generateBtn.disabled = true;
      generateBtn.textContent = 'Generating...';

      try {
        const response = await fetch('/api/vouchers/generate', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ amount }),
        });

        if (response.ok) {
          const data = await response.json();
          voucherCodeP.textContent = data.code;
          resultDiv.classList.remove('hidden');
        } else {
          alert('Failed to generate voucher');
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Error generating voucher');
      }

      generateBtn.disabled = false;
      generateBtn.textContent = 'Generate Voucher';
    });
  </script>
</body>
</html>
